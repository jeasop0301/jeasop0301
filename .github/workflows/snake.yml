name: Contribution Snake

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake
        uses: Platane/snk@v3
        id: snake-gen
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg?color_snake=F97316&color_dots=#ebedf0,#ffedd5,#fdba74,#fb923c,#ea580c
            dist/github-snake-dark.svg?palette=github-dark&color_snake=F97316&color_dots=#161b22,#3f2d1a,#7c4a1e,#c2680f,#f97316

      - name: Publish to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
